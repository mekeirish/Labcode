<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Sniper Lab - Component Sandbox</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --bg: #1e1e22; 
            --card-bg: #1e1e22; 
            --shadow-dark: #111113; 
            --shadow-light: #2b2b31; 
            --accent: #ffca28; 
            --text: #c9d1d9; 
            --danger: #f85149; 
            --success: #7ee787; 
            --blue: #58a6ff;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex; 
            flex-direction: column; 
            min-height: 100vh; 
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); 
            border: none; 
            margin-bottom: 20px; 
        }
        
        /* Onglets tactiles internes (Zéro Popup) */
        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
            background: var(--card-bg);
            padding: 6px;
            border-radius: 14px;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
        }
        
        .tab-btn {
            flex: 1;
            padding: 12px;
            border: none;
            background: transparent;
            color: #888;
            font-weight: bold;
            font-size: 0.8rem;
            cursor: pointer;
            border-radius: 10px;
            transition: all 0.2s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        .tab-btn.active {
            color: var(--accent);
            background: var(--bg);
            box-shadow: 4px 4px 8px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
        }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        input, textarea { 
            width: 100%; 
            margin: 8px 0; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--bg); 
            color: white; 
            box-sizing: border-box; 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            outline: none;
            font-family: monospace;
            font-size: 13px;
        }
        
        textarea { resize: vertical; height: 220px; }
        
        button.btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 10px; 
            transition: all 0.2s ease; 
            background: var(--card-bg); 
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); 
            text-transform: uppercase;
            letter-spacing: 1px;
        }
        
        button.btn:active { 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            transform: scale(0.99); 
        }
        
        .yellow-btn { color: var(--accent); }
        .blue-btn { color: var(--blue); }
        .red-btn { color: var(--danger); }
        
        /* Iframe de rendu virtuel */
        .preview-container {
            position: relative;
            width: 100%;
            height: 300px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light);
            background: #fff;
            margin-top: 10px;
        }
        
        iframe { width: 100%; height: 100%; border: none; background: #fff; }

        /* Bouton flottant Plein Écran Neumorphique */
        .fullscreen-btn {
            position: absolute;
            bottom: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            background: #1e1e22;
            color: var(--accent);
            font-size: 18px;
            font-weight: bold;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            box-shadow: 4px 4px 8px rgba(0,0,0,0.4), -2px -2px 6px rgba(255,255,255,0.1);
            transition: all 0.2s ease;
            z-index: 1000;
        }
        .fullscreen-btn:active {
            box-shadow: inset 2px 2px 5px rgba(0,0,0,0.5), inset -2px -2px 5px rgba(255,255,255,0.1);
            transform: scale(0.96);
        }
        
        /* Console Log Mobile Intégrée */
        #consoleLog { 
            background: var(--bg); 
            color: var(--success); 
            padding: 15px; 
            height: 180px; 
            overflow-y: auto; 
            font-family: monospace; 
            font-size: 11px; 
            border-radius: 14px; 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            border: none;
            margin-top: 15px;
            line-height: 1.6;
        }
        
        .log-err { color: var(--danger); border-left: 2px solid var(--danger); padding-left: 5px; }
        .log-warn { color: var(--accent); border-left: 2px solid var(--accent); padding-left: 5px; }
        .log-info { color: var(--blue); }
        
        .signature {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

    <!-- Système d'onglets pour navigation sur un seul écran mobile -->
    <div class="tabs">
        <button class="tab-btn active" onclick="switchTab('editor-tab')">🧪 Code Sandbox</button>
        <button class="tab-btn" onclick="switchTab('extractor-tab')">✂️ Extractor</button>
    </div>

    <!-- ONGLET 1 : SANDBOX ET EXECUTION DIRECTE -->
    <div id="editor-tab" class="tab-content active">
        <div class="card">
            <textarea id="sandboxCode" placeholder="Colle ton code HTML/CSS/JS ici pour le tester instantanément..." oninput="autoSaveSandbox()"></textarea>
            <button class="btn yellow-btn" onclick="runSandbox()">⚡ EXÉCUTER DANS LE LAB</button>
        </div>

        <div class="card" style="padding: 12px;">
            <div style="font-size: 0.75rem; text-transform: uppercase; color: #888; margin: 0 0 8px 5px; letter-spacing: 1px;">Rendu Temps Réel :</div>
            <div class="preview-container" id="previewContainer">
                <iframe id="labPreview"></iframe>
                <button class="fullscreen-btn" id="fsBtn" onclick="toggleFullscreen()">⛶</button>
            </div>
            <div id="consoleLog">> Console prête. En attente d'exécution...</div>
            <button class="btn red-btn" style="font-size: 0.7rem; padding: 10px;" onclick="clearConsole()">🗑️ EFFACER LA CONSOLE</button>
        </div>
    </div>

    <!-- ONGLET 2 : EXTRACTEUR CHIRURGICAL DE BLOCS -->
    <div id="extractor-tab" class="tab-content">
        <div class="card">
            <div style="font-size: 0.75rem; text-transform: uppercase; color: #888; margin-bottom: 5px; letter-spacing: 1px;">Extraction de Code source</div>
            <textarea id="rawSource" rows="6" placeholder="Colle un code HTML complet ici pour en extraire des parties spécifiques..."></textarea>
            
            <button class="btn blue-btn" onclick="extractBlock('style')">🎨 EXTRAIRE LES STYLES (CSS)</button>
            <button class="btn blue-btn" onclick="extractBlock('script')">⚙️ EXTRAIRE LES SCRIPTS (JS)</button>
            <button class="btn blue-btn" onclick="extractBlock('body')">📱 EXTRAIRE LE CORPS (BODY)</button>
        </div>

        <div class="card">
            <div style="font-size: 0.75rem; text-transform: uppercase; color: #888; margin-bottom: 5px; letter-spacing: 1px;">Résultat de l'extraction :</div>
            <textarea id="extractionResult" readonly placeholder="Le bloc extrait apparaîtra ici..."></textarea>
            <button class="btn yellow-btn" onclick="copyExtraction()">📋 COPIER LE COMPOSANT</button>
        </div>
    </div>

    <div class="signature">Made by Brahim Laiche 2026 Paris</div>

<script>
    // --- Gestion de la Navigation Interne ---
    function switchTab(tabId) {
        document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
        document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
        
        document.getElementById(tabId).classList.add('active');
        event.target.classList.add('active');
    }

    // --- Système de Console Virtuelle Mobile ---
    const consoleLogger = (msg, type = "info") => {
        const consoleEl = document.getElementById('consoleLog');
        if (!consoleEl) return;
        
        let classType = "log-info";
        let prefix = "> ";
        if (type === "error") { classType = "log-err"; prefix = "❌ Error: "; }
        if (type === "warn") { classType = "log-warn"; prefix = "⚠️ Warn: "; }
        
        consoleEl.innerHTML += `<div class="${classType}">${prefix}${msg}</div>`;
        consoleEl.scrollTop = consoleEl.scrollHeight;
    };

    function clearConsole() {
        document.getElementById('consoleLog').innerHTML = "<div>> Console vidée.</div>";
    }

    // --- Moteur de Rendu local (Iframe Injection) ---
    function runSandbox() {
        const code = document.getElementById('sandboxCode').value;
        const iframe = document.getElementById('labPreview');
        clearConsole();
        consoleLogger("Compilation locale du composant...", "warn");

        // Script d'interception magique à injecter dans l'iframe pour capturer les logs de ton code
        const hookScript = `
            <script>
                window.onerror = function(message, source, lineno, colno, error) {
                    window.parent.postMessage({type: 'error', data: message + " (Ligne " + lineno + ")"}, '*');
                    return false;
                };
                console.log = function(...args) {
                    window.parent.postMessage({type: 'log', data: args.join(' ')}, '*');
                };
                console.warn = function(...args) {
                    window.parent.postMessage({type: 'warn', data: args.join(' ')}, '*');
                };
                console.error = function(...args) {
                    window.parent.postMessage({type: 'error', data: args.join(' ')}, '*');
                };
            <\/script>
        `;

        // Assemblage final du code injecté
        let finalCode = code;
        if (finalCode.includes('<head>')) {
            finalCode = finalCode.replace('<head>', '<head>' + hookScript);
        } else {
            finalCode = hookScript + finalCode;
        }

        const blob = new Blob([finalCode], { type: 'text/html' });
        iframe.src = URL.createObjectURL(blob);
        consoleLogger("Exécution réussie.", "success");
    }

    // Écouteur de messages pour intercepter la télémétrie de l'iframe
    window.addEventListener('message', function(e) {
        if (e.data && e.data.type) {
            consoleLogger(e.data.data, e.data.type);
        }
    });

    // --- Gestion du Plein Écran Natif API ---
    function toggleFullscreen() {
        const container = document.getElementById('previewContainer');
        const btn = document.getElementById('fsBtn');
        
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            if (container.requestFullscreen) {
                container.requestFullscreen();
            } else if (container.webkitRequestFullscreen) {
                container.webkitRequestFullscreen(); // Support iOS/Safari
            }
            btn.style.color = "var(--danger)";
        } else {
            if (document.exitFullscreen) {
                document.exitFullscreen();
            } else if (document.webkitExitFullscreen) {
                document.webkitExitFullscreen();
            }
            btn.style.color = "var(--accent)";
        }
    }

    // Synchronisation de l'état du bouton si l'utilisateur quitte le plein écran via le geste natif du téléphone
    function onFsChange() {
        const btn = document.getElementById('fsBtn');
        if (!document.fullscreenElement && !document.webkitFullscreenElement) {
            btn.style.color = "var(--accent)";
        }
    }
    document.addEventListener('fullscreenchange', onFsChange);
    document.addEventListener('webkitfullscreenchange', onFsChange);

    // --- Persistance Locale Auto-save ---
    function autoSaveSandbox() {
        localStorage.setItem('sniper_sandbox_cache', document.getElementById('sandboxCode').value);
    }

    // --- Extracteur Chirurgical de Composants (Scraping de balises) ---
    function extractBlock(type) {
        const source = document.getElementById('rawSource').value;
        const resultArea = document.getElementById('extractionResult');
        
        if(!source) {
            alert("Veuillez coller du code source au préalable.");
            return;
        }

        let regex;
        if (type === 'style') regex = /<style[^>]*>([\s\S]*?)<\/style>/gi;
        if (type === 'script') regex = /<script[^>]*>([\s\S]*?)<\/script>/gi;
        if (type === 'body') regex = /<body[^>]*>([\s\S]*?)<\/body>/gi;

        let matches = [];
        let match;
        while ((match = regex.exec(source)) !== null) {
            matches.push(match[1].trim());
        }

        if (matches.length > 0) {
            resultArea.value = matches.join("\n\n/* --- Nouveau Bloc Détecté --- */\n\n");
            alert(`Succès ! ${matches.length} bloc(s) ${type.toUpperCase()} extrait(s).`);
        } else {
            resultArea.value = "";
            alert(`Aucun bloc <${type}> trouvé dans ce fichier.`);
        }
    }

    function copyExtraction() {
        const res = document.getElementById('extractionResult');
        if(!res.value) return;
        navigator.clipboard.writeText(res.value);
        alert("Composant copié dans ton presse-papier !");
    }

    // --- Initialisation au chargement ---
    window.onload = function() {
        const cached = localStorage.getItem('sniper_sandbox_cache');
        if (cached) {
            document.getElementById('sandboxCode').value = cached;
        }
    };
</script>

<script>
    if('serviceWorker' in navigator){
        window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
    }
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>

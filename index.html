<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Labcode - Sandbox</title>
    <style>
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        :root { 
            --bg: #1e1e22; 
            --card-bg: #1e1e22; 
            --shadow-dark: #111113; 
            --shadow-light: #2b2b31; 
            --accent: #ffca28; 
            --text: #c9d1d9; 
            --success: #7ee787;
        }
        
        body { 
            background: var(--bg); 
            color: var(--text); 
            font-family: -apple-system, system-ui, sans-serif; 
            padding: 15px; 
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        
        .card { 
            background: var(--card-bg); 
            padding: 20px; 
            border-radius: 16px; 
            box-shadow: 6px 6px 12px var(--shadow-dark), -6px -6px 12px var(--shadow-light); 
            border: none; 
            margin-bottom: 20px; 
        }
        
        h2 { font-size: 1.1rem; text-transform: uppercase; letter-spacing: 1px; color: var(--accent); margin-top: 0; }
        
        textarea { 
            width: 100%; 
            height: 250px;
            margin: 8px 0; 
            padding: 14px; 
            border-radius: 12px; 
            border: none; 
            background: var(--bg); 
            color: #fff; 
            font-family: monospace;
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            outline: none;
            resize: none;
            font-size: 13px;
        }
        
        button.btn { 
            width: 100%; 
            padding: 15px; 
            border-radius: 12px; 
            border: none; 
            font-weight: bold; 
            cursor: pointer; 
            margin-top: 5px; 
            transition: all 0.2s ease; 
            background: var(--card-bg); 
            box-shadow: 5px 5px 10px var(--shadow-dark), -5px -5px 10px var(--shadow-light); 
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--success);
        }
        
        button.btn:active { 
            box-shadow: inset 4px 4px 8px var(--shadow-dark), inset -4px -4px 8px var(--shadow-light); 
            transform: scale(0.99); 
        }

        /* Zone de rendu (Iframe) */
        .preview-container {
            flex: 1;
            min-height: 300px;
            border-radius: 14px;
            overflow: hidden;
            box-shadow: 4px 4px 8px var(--shadow-dark), -2px -2px 6px var(--shadow-light);
            background: #fff;
            position: relative;
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: #fff;
        }

        .signature {
            text-align: center;
            font-size: 11px;
            color: #555;
            margin-top: auto;
            padding-top: 30px;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#4b6cb7">
<link rel="apple-touch-icon" href="icon.png"></head>
<body>

    <div class="card">
        <h2>Labcode - Sandbox local</h2>
        <textarea id="codeEditor" placeholder="Colle ou saisis ton code HTML/JS/CSS ici..."><!-- Ton code par défaut --></textarea>
        <!-- C'est ici que l'action runAndGoFullscreen() est appelée -->
        <button class="btn" onclick="runAndGoFullscreen()">⚡ EXÉCUTER DANS LE LAB</button>
    </div>

    <div class="preview-container" id="labPreviewContainer">
        <iframe id="livePreview" name="livePreview"></iframe>
    </div>

    <div class="signature">Made by Brahim Laiche 2026 Paris</div>

<script>
    function runAndGoFullscreen() {
        const code = document.getElementById('codeEditor').value;
        const iframe = document.getElementById('livePreview');
        const container = document.getElementById('labPreviewContainer');
        
        // 1. Injection immédiate du code dans l'iframe
        const dst = iframe.contentDocument || iframe.contentWindow.document;
        dst.open();
        dst.write(code);
        dst.close();

        // 2. Bascule forcée en mode plein écran du bloc de rendu (Iframe)
        // Gère la compatibilité standard, iOS (Safari) et Android (Chrome)
        if (container.requestFullscreen) {
            container.requestFullscreen();
        } else if (container.webkitRequestFullscreen) { /* Safari Mobile */
            container.webkitRequestFullscreen();
        } else if (container.msRequestFullscreen) {
            container.msRequestFullscreen();
        }
    }
</script>

<script>
    if('serviceWorker' in navigator){
        window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));
    }
</script>

<script>if('serviceWorker' in navigator){window.addEventListener('load',()=>navigator.serviceWorker.register('./sw.js'));}</script>
</body>
</html>
